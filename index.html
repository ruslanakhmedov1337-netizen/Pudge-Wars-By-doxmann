<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pudge Wars Mobile 1:1 Fullscreen</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: monospace; user-select: none; touch-action: none; }
        
        /* Игровое поле на весь экран смартфона */
        canvas { display: block; width: 100vw; height: 100vh; background: #1a3814; }
        
        /* Зоны для удобных тач-джойстиков под большие пальцы */
        .joy-zone { position: absolute; bottom: 25px; width: 110px; height: 110px; background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; }
        #left-joy { left: 40px; }
        #right-joy { right: 40px; }
        .stick { width: 40px; height: 40px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: transform 0.03s linear; }

        /* Панель способностей рядом с правым джойстиком для быстрых комбо */
        #skills-panel { position: absolute; bottom: 155px; right: 45px; display: flex; gap: 12px; z-index: 10; }
        .skill-wrapper { position: relative; width: 48px; height: 48px; }
        .skill { width: 100%; height: 100%; border: 2px solid #444; border-radius: 6px; background-size: cover; background-position: center; background-color: #111; box-shadow: 0 4px 10px rgba(0,0,0,0.6); }
        
        /* Привязка картинок, которые ты загрузишь на GitHub */
        #skill-q { background-image: url('hook_icon.png'); }   /* Твое фото Хука */
        #skill-w { background-image: url('shift_icon.png'); }  /* Твое фото Шифта */
        #skill-e { background-image: url('blink_icon.png'); }  /* Твое фото Блинка */
        
        .cooldown-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; border-radius: 4px; display: none; }
        .hotkey { position: absolute; bottom: 2px; right: 4px; color: #ffcc00; font-size: 10px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="skills-panel">
        <div class="skill-wrapper">
            <div class="skill" id="skill-q"></div>
            <div class="cooldown-overlay" id="cd-q">0</div>
            <div class="hotkey">Q</div>
        </div>
        <div class="skill-wrapper">
            <div class="skill" id="skill-w"></div>
            <div class="cooldown-overlay" id="cd-w">0</div>
            <div class="hotkey">W</div>
        </div>
        <div class="skill-wrapper">
            <div class="skill" id="skill-e"></div>
            <div class="cooldown-overlay" id="cd-e">0</div>
            <div class="hotkey">E</div>
        </div>
    </div>

    <div class="joy-zone" id="left-joy"><div class="stick" id="left-stick"></div></div>
    <div class="joy-zone" id="right-joy"><div class="stick" id="right-stick" style="background: rgba(235,196,47,0.3);"></div></div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let state = {
            score: 0, record: 0,
            pudge: { x: window.innerWidth / 2, y: window.innerHeight - 120, radius: 25, speed: 4.8, isPhaseShift: false, phaseShiftTimer: 0, lastDir: { x: 0, y: -1 } },
            enemies: [],
            hook: { x: 0, y: 0, vx: 0, vy: 0, active: false, startX: 0, startY: 0, maxLen: window.innerHeight * 0.6, returning: false },
            cooldowns: { q: { current: 0, max: 3 }, w: { current: 0, max: 6 }, e: { current: 0, max: 8 } }
        };

        function initEnemies() {
            state.enemies = [];
            for(let i = 0; i < 3; i++) {
                state.enemies.push({
                    x: 100 + i * (canvas.width / 3),
                    y: 70 + Math.random() * 60,
                    radius: 25,
                    vx: (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 1.5)
                });
            }
        }
        initEnemies();

        let moveVector = { x: 0, y: 0 };

        setupJoystick("left-joy", "left-stick", (dx, dy) => {
            moveVector.x = dx; moveVector.y = dy;
            if (dx !== 0 || dy !== 0) {
                let len = Math.sqrt(dx*dx + dy*dy);
                state.pudge.lastDir = { x: dx / len, y: dy / len };
            }
        });

        setupJoystick("right-joy", "right-stick", (dx, dy, isRelease) => {
            if (isRelease && !state.hook.active && state.cooldowns.q.current === 0) {
                state.hook.active = true; state.hook.returning = false;
                state.hook.x = state.pudge.x; state.hook.y = state.pudge.y;
                state.hook.startX = state.pudge.x; state.hook.startY = state.pudge.y;
                let angle = Math.atan2(dy, dx);
                state.hook.vx = Math.cos(angle) * 16; state.hook.vy = Math.sin(angle) * 16;
                startCooldown('q');
            }
        });

        document.getElementById("skill-w").addEventListener("touchstart", (e) => { e.preventDefault(); usePhaseShift(); });
        document.getElementById("skill-e").addEventListener("touchstart", (e) => { e.preventDefault(); useBlink(); });

        function usePhaseShift() {
            if (state.cooldowns.w.current > 0 || state.pudge.isPhaseShift) return;
            state.pudge.isPhaseShift = true;
            state.pudge.phaseShiftTimer = 90; // 1.5 секунды неуязвимости
            startCooldown('w');
        }

        function useBlink() {
            if (state.cooldowns.e.current > 0 || state.pudge.isPhaseShift) return;
            state.pudge.x += state.pudge.lastDir.x * 160;
            state.pudge.y += state.pudge.lastDir.y * 160;
            keepInBounds();
            startCooldown('e');
        }

        function startCooldown(ability) {
            state.cooldowns[ability].current = state.cooldowns[ability].max;
            let overlay = document.getElementById(`cd-${ability}`);
            overlay.style.display = "flex"; overlay.innerText = state.cooldowns[ability].current;
            let interval = setInterval(() => {
                state.cooldowns[ability].current--;
                if (state.cooldowns[ability].current <= 0) {
                    overlay.style.display = "none"; clearInterval(interval);
                } else { overlay.innerText = state.cooldowns[ability].current; }
            }, 1000);
        }

        function keepInBounds() {
            let riverY = canvas.height / 2;
            if(state.pudge.x < 30) state.pudge.x = 30;
            if(state.pudge.x > canvas.width - 30) state.pudge.x = canvas.width - 30;
            if(state.pudge.y < riverY + 45) state.pudge.y = riverY + 45;
            if(state.pudge.y > canvas.height - 30) state.pudge.y = canvas.height - 30;
        }

        function setupJoystick(containerId, stickId, callback) {
            const container = document.getElementById(containerId);
            const stick = document.getElementById(stickId);
            let active = false;
            container.addEventListener("touchstart", () => active = true);
            container.addEventListener("touchmove", (e) => {
                if (!active) return;
                let t = e.touches[0]; let rect = container.getBoundingClientRect();
                let dx = t.clientX - (rect.left + rect.width/2); let dy = t.clientY - (rect.top + rect.height/2);
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist > 35) { dx = (dx/dist)*35; dy = (dy/dist)*35; }
                stick.style.transform = `translate(${dx}px, ${dy}px)`;
                callback(dx/35, dy/35, false);
            });
            container.addEventListener("touchend", () => {
                active = false; 
                let m = new WebKitCSSMatrix(window.getComputedStyle(stick).transform);
                stick.style.transform = "translate(0px, 0px)";
                callback(m.m41 || 0, m.m42 || -1, true);
                if(containerId === "left-joy") { moveVector.x = 0; moveVector.y = 0; }
            });
        }

        function update() {
            if (state.pudge.isPhaseShift) {
                state.pudge.phaseShiftTimer--;
                if (state.pudge.phaseShiftTimer <= 0) state.pudge.isPhaseShift = false;
            } else {
                state.pudge.x += moveVector.x * state.pudge.speed;
                state.pudge.y += moveVector.y * state.pudge.speed;
                keepInBounds();
            }

            state.enemies.forEach(env => {
                env.x += env.vx;
                if(env.x < 30 || env.x > canvas.width - 30) env.vx *= -1;
            });

            if (state.hook.active) {
                if (!state.hook.returning) {
                    state.hook.x += state.hook.vx; state.hook.y += state.hook.vy;
                    let curLen = Math.sqrt((state.hook.x - state.hook.startX)**2 + (state.hook.y - state.hook.startY)**2);
                    if (curLen >= state.hook.maxLen) state.hook.returning = true;

                    state.enemies.forEach(env => {
                        let dist = Math.sqrt((state.hook.x - env.x)**2 + (state.hook.y - env.y)**2);
                        if (dist < env.radius + 12) {
                            state.score++; if(state.score > state.record) state.record = state.score;
                            state.hook.returning = true; env.x = Math.random() * (canvas.width - 60) + 30;
                        }
                    });
                } else {
                    let dx = state.pudge.x - state.hook.x; let dy = state.pudge.y - state.hook.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 22) state.hook.active = false;
                    else { state.hook.x += (dx/dist) * 18; state.hook.y += (dy/dist) * 18; }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Поле боя из оригинала (Пиксельная трава)
            ctx.fillStyle = "#264a1d"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#22431a"; ctx.lineWidth = 2;
            for (let i = 0; i < canvas.width; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }

            // Река по центру экрана
            let riverY = canvas.height / 2;
            ctx.fillStyle = "#172d42"; ctx.fillRect(0, riverY - 30, canvas.width, 60);
            ctx.fillStyle = "#1c3752"; ctx.fillRect(0, riverY - 10, canvas.width, 20);

            // Текст очков
            ctx.fillStyle = "#39eb52"; ctx.font = "bold 15px monospace"; ctx.fillText(`Score: ${state.score}`, 25, 35);
            ctx.fillStyle = "#ebc42f"; ctx.fillText(`Record: ${state.record}`, 145, 35);

            // ОРИГИНАЛЬНАЯ АНИМАЦИЯ ЦЕПИ ХУКА
            if (state.hook.active) {
                ctx.strokeStyle = "#8a8a8a"; ctx.lineWidth = 4;
                ctx.setLineDash([5, 8]); // Превращаем сплошную линию в стальные звенья цепи
                ctx.beginPath(); ctx.moveTo(state.pudge.x, state.pudge.y); ctx.lineTo(state.hook.x, state.hook.y); ctx.stroke();
                ctx.setLineDash([]);

                // Загнутый наконечник-крюк
                ctx.save();
                ctx.translate(state.hook.x, state.hook.y);
                ctx.fillStyle = "#d1ad15"; ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = "#b01919"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(0, 0, 11, 0, Math.PI, true); ctx.stroke();
                ctx.restore();
            }

            // Наш пиксельный Пудж (с эффектом прозрачности во время Шифта)
            ctx.fillStyle = state.pudge.isPhaseShift ? "rgba(0,191,255,0.15)" : "rgba(40, 167, 69, 0.25)";
            ctx.beginPath(); ctx.arc(state.pudge.x, state.pudge.y, state.pudge.radius + 6, 0, Math.PI*2); ctx.fill();
            
            ctx.save(); ctx.translate(state.pudge.x, state.pudge.y);
            if (state.pudge.isPhaseShift) ctx.globalAlpha = 0.4;
            ctx.fillStyle = "#a66846"; ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill(); // Тело
            ctx.fillStyle = "#5c3924"; ctx.fillRect(-7, -21, 14, 7); // Его косичка
            ctx.fillStyle = "#4f1a1a"; ctx.fillRect(-11, -3, 5, 5); ctx.fillRect(6, -3, 5, 5); // Детали
            ctx.restore(); ctx.globalAlpha = 1.0;

            // Вражеские Пуджи сверху реки
            state.enemies.forEach(env => {
                ctx.fillStyle = "rgba(220, 53, 69, 0.2)";
                ctx.beginPath(); ctx.arc(env.x, env.y, env.radius + 6, 0, Math.PI*2); ctx.fill();

                ctx.save(); ctx.translate(env.x, env.y);
                ctx.fillStyle = "#a64646"; ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#3c1818"; ctx.fillRect(-5, -19, 10, 5);
                ctx.restore();
            });
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
