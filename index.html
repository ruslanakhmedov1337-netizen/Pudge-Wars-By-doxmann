<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pudge Wars</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            overflow: hidden;
            touch-action: none;
        }
        #game {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            background: #1a1a1a;
            border: 2px solid #333;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #2d2d2d;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        #score span { color: #4caf50; }
        #score .deaths { color: #f44336; }
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        #game-over h1 {
            color: #f44336;
            font-size: 32px;
            margin-bottom: 10px;
        }
        #game-over p {
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
        }
        #game-over button {
            padding: 12px 32px;
            font-size: 18px;
            background: #4caf50;
            border: none;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            pointer-events: auto;
        }
        #game-over button:active { transform: scale(0.95); }
        #game-over.active { display: flex; }
    </style>
</head>
<body>
<div id="game">
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div id="score">
            🏆 <span id="kills">0</span> &nbsp;|&nbsp; 💀 <span class="deaths" id="deaths">0</span>
        </div>
        <div id="game-over">
            <h1>💀 YOU DIED</h1>
            <p>Score: <span id="final-score">0</span></p>
            <button id="restart-btn">↻ PLAY AGAIN</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// 1. CANVAS SETUP
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width = 500;
const H = canvas.height = 500;

// ============================================================
// 2. GAME STATE
// ============================================================
const state = {
    kills: 0,
    deaths: 0,
    gameOver: false,
    hero: { x: W/2, y: H/2, r: 16 },
    bots: [],
    hook: null,
    particles: [],
    aimAngle: 0,
    leftJoystick: { active: false, dx: 0, dy: 0, startX: 0, startY: 0, id: null },
    rightJoystick: { active: false, dx: 0, dy: 0, startX: 0, startY: 0, id: null },
    spawnTimer: 0,
    maxBots: 3,
    botHookCooldown: 0,
    heroHookCooldown: 0,
    heroMaxHookCooldown: 30,
    botMaxHookCooldown: 60,
};

// ============================================================
// 3. BOTS
// ============================================================
function createBots() {
    state.bots = [];
    const colors = ['#c0392b', '#2980b9', '#8e44ad'];
    const positions = [
        { x: 80, y: 80 },
        { x: W - 80, y: 80 },
        { x: 80, y: H - 80 },
    ];
    for (let i = 0; i < 3; i++) {
        state.bots.push({
            x: positions[i].x,
            y: positions[i].y,
            r: 16,
            color: colors[i],
            alive: true,
            hookCooldown: 0,
            maxHookCooldown: 60 + Math.random() * 40,
            respawnTimer: 0,
            targetX: positions[i].x,
            targetY: positions[i].y,
            hook: null,
        });
    }
}

// ============================================================
// 4. JOYSTICKS
// ============================================================
function handleTouchStart(e) {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    for (const touch of e.changedTouches) {
        const x = (touch.clientX - rect.left) * (W / rect.width);
        const y = (touch.clientY - rect.top) * (H / rect.height);
        if (x < W / 2) {
            state.leftJoystick.active = true;
            state.leftJoystick.id = touch.identifier;
            state.leftJoystick.startX = x;
            state.leftJoystick.startY = y;
            state.leftJoystick.dx = 0;
            state.leftJoystick.dy = 0;
        } else {
            state.rightJoystick.active = true;
            state.rightJoystick.id = touch.identifier;
            state.rightJoystick.startX = x;
            state.rightJoystick.startY = y;
            state.rightJoystick.dx = 0;
            state.rightJoystick.dy = 0;
        }
    }
}

function handleTouchMove(e) {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    for (const touch of e.changedTouches) {
        const x = (touch.clientX - rect.left) * (W / rect.width);
        const y = (touch.clientY - rect.top) * (H / rect.height);
        if (state.leftJoystick.id === touch.identifier && state.leftJoystick.active) {
            const dx = x - state.leftJoystick.startX;
            const dy = y - state.leftJoystick.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 50;
            if (dist > 0) {
                const angle = Math.atan2(dy, dx);
                const move = Math.min(dist / 15, 1) * 3;
                state.hero.x += Math.cos(angle) * move;
                state.hero.y += Math.sin(angle) * move;
                state.hero.x = Math.max(20, Math.min(W - 20, state.hero.x));
                state.hero.y = Math.max(20, Math.min(H - 20, state.hero.y));
            }
            if (dist > maxDist) {
                state.leftJoystick.dx = (dx / dist) * maxDist;
                state.leftJoystick.dy = (dy / dist) * maxDist;
            } else {
                state.leftJoystick.dx = dx;
                state.leftJoystick.dy = dy;
            }
        }
        if (state.rightJoystick.id === touch.identifier && state.rightJoystick.active) {
            const dx = x - state.rightJoystick.startX;
            const dy = y - state.rightJoystick.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 5) state.aimAngle = Math.atan2(dy, dx);
            const maxDist = 60;
            if (dist > maxDist) {
                state.rightJoystick.dx = (dx / dist) * maxDist;
                state.rightJoystick.dy = (dy / dist) * maxDist;
            } else {
                state.rightJoystick.dx = dx;
                state.rightJoystick.dy = dy;
            }
        }
    }
}

function handleTouchEnd(e) {
    e.preventDefault();
    for (const touch of e.changedTouches) {
        if (state.leftJoystick.id === touch.identifier) {
            state.leftJoystick.active = false;
            state.leftJoystick.dx = 0;
            state.leftJoystick.dy = 0;
            state.leftJoystick.id = null;
        }
        if (state.rightJoystick.id === touch.identifier) {
            const dist = Math.sqrt(state.rightJoystick.dx**2 + state.rightJoystick.dy**2);
            if (dist > 20) throwHook(state.aimAngle);
            state.rightJoystick.active = false;
            state.rightJoystick.dx = 0;
            state.rightJoystick.dy = 0;
            state.rightJoystick.id = null;
        }
    }
}

canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

// Mouse fallback
let mouseDown = false;
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (W / rect.width);
    const y = (e.clientY - rect.top) * (H / rect.height);
    if (x < W/2) {
        state.leftJoystick.active = true;
        state.leftJoystick.startX = x;
        state.leftJoystick.startY = y;
    } else {
        state.rightJoystick.active = true;
        state.rightJoystick.startX = x;
        state.rightJoystick.startY = y;
    }
    mouseDown = true;
});
canvas.addEventListener('mousemove', (e) => {
    if (!mouseDown) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (W / rect.width);
    const y = (e.clientY - rect.top) * (H / rect.height);
    if (state.leftJoystick.active) {
        const dx = x - state.leftJoystick.startX;
        const dy = y - state.leftJoystick.startY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 0) {
            const angle = Math.atan2(dy, dx);
            const move = Math.min(dist / 15, 1) * 3;
            state.hero.x += Math.cos(angle) * move;
            state.hero.y += Math.sin(angle) * move;
            state.hero.x = Math.max(20, Math.min(W - 20, state.hero.x));
            state.hero.y = Math.max(20, Math.min(H - 20, state.hero.y));
        }
        const maxDist = 50;
        if (dist > maxDist) {
            state.leftJoystick.dx = (dx / dist) * maxDist;
            state.leftJoystick.dy = (dy / dist) * maxDist;
        } else {
            state.leftJoystick.dx = dx;
            state.leftJoystick.dy = dy;
        }
    }
    if (state.rightJoystick.active) {
        const dx = x - state.rightJoystick.startX;
        const dy = y - state.rightJoystick.startY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 5) state.aimAngle = Math.atan2(dy, dx);
        const maxDist = 60;
        if (dist > maxDist) {
            state.rightJoystick.dx = (dx / dist) * maxDist;
            state.rightJoystick.dy = (dy / dist) * maxDist;
        } else {
            state.rightJoystick.dx = dx;
            state.rightJoystick.dy = dy;
        }
    }
});
canvas.addEventListener('mouseup', () => {
    if (state.rightJoystick.active) {
        const dist = Math.sqrt(state.rightJoystick.dx**2 + state.rightJoystick.dy**2);
        if (dist > 20) throwHook(state.aimAngle);
    }
    state.leftJoystick.active = false;
    state.leftJoystick.dx = 0;
    state.rightJoystick.active = false;
    state.rightJoystick.dx = 0;
    mouseDown = false;
});
canvas.addEventListener('mouseleave', () => {
    state.leftJoystick.active = false;
    state.leftJoystick.dx = 0;
    state.rightJoystick.active = false;
    state.rightJoystick.dx = 0;
    mouseDown = false;
});

// ============================================================
// 5. HOOK
// ============================================================
function throwHook(angle) {
    if (state.heroHookCooldown > 0 || state.hook || state.gameOver) return;
    state.heroHookCooldown = state.heroMaxHookCooldown;
    const startX = state.hero.x, startY = state.hero.y;
    const length = 280;
    const endX = startX + Math.cos(angle) * length;
    const endY = startY + Math.sin(angle) * length;
    state.hook = { x1: startX, y1: startY, x2: endX, y2: endY, life: 20 };
    // Check hit on bots
    for (const bot of state.bots) {
        if (!bot.alive) continue;
        const d = distToSegment(bot.x, bot.y, startX, startY, endX, endY);
        if (d < 25) {
            bot.alive = false;
            bot.respawnTimer = 180;
            state.kills++;
            updateUI();
            spawnParticles(bot.x, bot.y, '#ff6b6b', 20);
        }
    }
}

function distToSegment(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const lenSq = dx*dx + dy*dy;
    if (lenSq === 0) return Math.sqrt((px-x1)**2 + (py-y1)**2);
    let t = ((px-x1)*dx + (py-y1)*dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    const projX = x1 + t*dx, projY = y1 + t*dy;
    return Math.sqrt((px-projX)**2 + (py-projY)**2);
}

// ============================================================
// 6. PARTICLES
// ============================================================
function spawnParticles(x, y, color, count = 15) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * 2 * Math.PI;
        const speed = 1 + Math.random() * 3;
        state.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 20 + Math.random() * 20,
            maxLife: 40,
            r: 2 + Math.random() * 3,
            color,
        });
    }
}

// ============================================================
// 7. BOTS AI
// ============================================================
function updateBots() {
    for (const bot of state.bots) {
        if (!bot.alive) {
            bot.respawnTimer--;
            if (bot.respawnTimer <= 0) {
                bot.alive = true;
                bot.x = 30 + Math.random() * (W - 60);
                bot.y = 30 + Math.random() * (H - 60);
                bot.hookCooldown = 0;
            }
            continue;
        }
        const dx = state.hero.x - bot.x;
        const dy = state.hero.y - bot.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 60) {
            const speed = 0.8;
            bot.x += (dx / dist) * speed;
            bot.y += (dy / dist) * speed;
        } else if (dist < 40) {
            const speed = 0.4;
            bot.x -= (dx / dist) * speed;
            bot.y -= (dy / dist) * speed;
        }
        bot.hookCooldown--;
        if (bot.hookCooldown <= 0 && dist < 280 && dist > 30) {
            bot.hookCooldown = bot.maxHookCooldown;
            const angle = Math.atan2(dy, dx);
            const startX = bot.x, startY = bot.y;
            const len = 260;
            const endX = startX + Math.cos(angle) * len;
            const endY = startY + Math.sin(angle) * len;
            const d = distToSegment(state.hero.x, state.hero.y, startX, startY, endX, endY);
            if (d < 25) {
                state.deaths++;
                state.gameOver = true;
                document.getElementById('final-score').textContent = state.kills;
                document.getElementById('game-over').classList.add('active');
                updateUI();
                spawnParticles(state.hero.x, state.hero.y, '#ff1744', 30);
            }
            bot.hook = { x1: startX, y1: startY, x2: endX, y2: endY, life: 20 };
        }
        if (bot.hook) {
            bot.hook.life--;
            if (bot.hook.life <= 0) bot.hook = null;
        }
    }
}

// ============================================================
// 8. UI
// ============================================================
function updateUI() {
    document.getElementById('kills').textContent = state.kills;
    document.getElementById('deaths').textContent = state.deaths;
}

// ============================================================
// 9. GAME LOOP
// ============================================================
function update() {
    if (state.gameOver) return;

    // Cooldowns
    if (state.heroHookCooldown > 0) state.heroHookCooldown--;

    // Hook life
    if (state.hook) {
        state.hook.life--;
        if (state.hook.life <= 0) state.hook = null;
    }

    // Particles
    for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) state.particles.splice(i, 1);
    }

    // Bots
    updateBots();

    // Respawn bots
    state.spawnTimer++;
    const alive = state.bots.filter(b => b.alive).length;
    if (state.spawnTimer > 120 && alive < state.maxBots) {
        state.spawnTimer = 0;
        for (const bot of state.bots) {
            if (!bot.alive) {
                bot.alive = true;
                bot.x = 30 + Math.random() * (W - 60);
                bot.y = 30 + Math.random() * (H - 60);
                bot.hookCooldown = 0;
                break;
            }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background / Arena
    ctx.fillStyle = '#2d2d2d';
    ctx.fillRect(0, 0, W, H);
    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
    }
    for (let y = 0; y < H; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
    }
    // Border
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 4;
    ctx.strokeRect(2, 2, W-4, H-4);

    // Draw bots
    for (const bot of state.bots) {
        if (!bot.alive) continue;
        // Body
        ctx.fillStyle = bot.color;
        ctx.beginPath();
        ctx.arc(bot.x, bot.y, bot.r, 0, 2 * Math.PI);
        ctx.fill();
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(bot.x - 6, bot.y - 5, 4, 0, 2 * Math.PI);
        ctx.arc(bot.x + 6, bot.y - 5, 4, 0, 2 * Math.PI);
        ctx.fill();
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(bot.x - 7, bot.y - 6, 2, 0, 2 * Math.PI);
        ctx.arc(bot.x + 5, bot.y - 6, 2, 0, 2 * Math.PI);
        ctx.fill();
        // Mouth
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(bot.x, bot.y + 5, 6, 0, Math.PI);
        ctx.stroke();
        // Hook
        if (bot.hook) {
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(bot.hook.x1, bot.hook.y1);
            ctx.lineTo(bot.hook.x2, bot.hook.y2);
            ctx.stroke();
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(bot.hook.x2, bot.hook.y2, 6, 0, 2 * Math.PI);
            ctx.fill();
        }
    }

    // Hero (Pudge)
    const h = state.hero;
    // Body
    ctx.fillStyle = '#4caf50';
    ctx.beginPath();
    ctx.arc(h.x, h.y, h.r, 0, 2 * Math.PI);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(h.x - 7, h.y - 6, 5, 0, 2 * Math.PI);
    ctx.arc(h.x + 7, h.y - 6, 5, 0, 2 * Math.PI);
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(h.x - 8, h.y - 7, 2.5, 0, 2 * Math.PI);
    ctx.arc(h.x + 6, h.y - 7, 2.5, 0, 2 * Math.PI);
    ctx.fill();
    // Mouth
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(h.x, h.y + 6, 7, 0, Math.PI);
    ctx.stroke();
    // Hook indicator
    if (state.hook) {
        ctx.strokeStyle = '#ff6b6b';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(state.hook.x1, state.hook.y1);
        ctx.lineTo(state.hook.x2, state.hook.y2);
        ctx.stroke();
        ctx.fillStyle = '#ff6b6b';
        ctx.beginPath();
        ctx.arc(state.hook.x2, state.hook.y2, 8, 0, 2 * Math.PI);
        ctx.fill();
    }

    // Aim line
    if (state.rightJoystick.active && state.rightJoystick.dx !== 0) {
        const angle = state.aimAngle;
        const len = 60;
        ctx.strokeStyle = 'rgba(255,107,107,0.4)';
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 6]);
        ctx.beginPath();
        ctx.moveTo(h.x, h.y);
        ctx.lineTo(h.x + Math.cos(angle) * len, h.y + Math.sin(angle) * len);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // Particles
    for (const p of state.particles) {
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.r/2, p.y - p.r/2, p.r, p.r);
    }
    ctx.globalAlpha = 1;

    // Joysticks
    if (state.leftJoystick.active) {
        const jx = state.leftJoystick.startX;
        const jy = state.leftJoystick.startY;
        ctx.strokeStyle = 'rgba(76,175,80,0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(jx, jy, 45, 0, 2 * Math.PI);
        ctx.stroke();
        ctx.fillStyle = 'rgba(76,175,80,0.2)';
        ctx.beginPath();
        ctx.arc(jx + state.leftJoystick.dx, jy + state.leftJoystick.dy, 18, 0, 2 * Math.PI);
        ctx.fill();
    }
    if (state.rightJoystick.active) {
        const jx = state.rightJoystick.startX;
        const jy = state.rightJoystick.startY;
        ctx.strokeStyle = 'rgba(255,107,107,0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(jx, jy, 45, 0, 2 * Math.PI);
        ctx.stroke();
        ctx.fillStyle = 'rgba(255,107,107,0.2)';
        ctx.beginPath();
        ctx.arc(jx + state.rightJoystick.dx, jy + state.rightJoystick.dy, 18, 0, 2 * Math.PI);
        ctx.fill();
    }
}

// ============================================================
// 10. RESTART
// ============================================================
document.getElementById('restart-btn').addEventListener('click', () => {
    state.gameOver = false;
    state.kills = 0;
    state.deaths = 0;
    state.hook = null;
    state.particles = [];
    state.hero.x = W/2;
    state.hero.y = H/2;
    state.heroHookCooldown = 0;
    document.getElementById('game-over').classList.remove('active');
    updateUI();
    createBots();
});

// ============================================================
// 11. START
// ============================================================
createBots();
updateUI();

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
