<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pudge Wars — Mobile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }
        #game {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 900px;
            background: #1a1a1a;
            border: 2px solid #2a2a2a;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            image-rendering: pixelated;
        }
        #top-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #0d0d0d;
            border-bottom: 2px solid #2a2a2a;
            color: #00ff41;
            font-size: 12px;
            min-height: 36px;
            image-rendering: pixelated;
        }
        .score-dota {
            display: flex;
            gap: 8px;
            font-size: 16px;
            font-weight: bold;
        }
        .score-dota .kills { color: #00ff41; }
        .score-dota .deaths { color: #ff1a1a; }
        .score-dota .sep { color: #444; }
        #game-field {
            flex: 1;
            background: #0d0d0d;
            position: relative;
            overflow: hidden;
            touch-action: none;
            image-rendering: pixelated;
        }
        #game-field canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            image-rendering: pixelated;
        }
        #status-bar {
            display: flex;
            justify-content: space-between;
            padding: 3px 12px;
            background: #0d0d0d;
            border-top: 2px solid #2a2a2a;
            color: #00ff41;
            font-size: 10px;
            image-rendering: pixelated;
        }
        #status-bar .hp { color: #ff1a1a; }
        #status-bar .energy { color: #00ff41; }
        /* ===== МОДАЛЬНОЕ ОКНО ===== */
        #modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            image-rendering: pixelated;
        }
        #modal-overlay.active { display: flex; }
        #modal-box {
            background: #0d0d0d;
            border: 3px solid #2a2a2a;
            padding: 30px 20px 20px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            border-radius: 12px;
            image-rendering: pixelated;
        }
        #modal-box h2 {
            color: #ff1a1a;
            font-size: 20px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        #modal-box p {
            color: #00ff41;
            font-size: 14px;
            margin-bottom: 20px;
        }
        #modal-box .btn-ok {
            background: #0d0d0d;
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 10px 40px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 6px;
            image-rendering: pixelated;
        }
        #modal-box .btn-ok:hover {
            background: #00ff41;
            color: #0d0d0d;
        }
        #modal-box .btn-ok:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="game">
        <div id="top-panel">
            <div class="score-dota">
                <span class="kills" id="killsDisplay">0</span>
                <span class="sep">/</span>
                <span class="deaths" id="deathsDisplay">0</span>
            </div>
            <div style="color:#00ff41;font-size:10px;">⚔️ Pudge Wars</div>
        </div>
        <div id="game-field">
            <canvas id="gameCanvas"></canvas>
            <div id="modal-overlay">
                <div id="modal-box">
                    <h2>💀 ТЫ УМЕР</h2>
                    <p id="modal-text">Тебя убил хук бота!</p>
                    <button class="btn-ok" id="btnOk">ОК</button>
                </div>
            </div>
        </div>
        <div id="status-bar">
            <span class="hp">❤️ HP: <span id="hpDisplay">100</span></span>
            <span class="energy">⚡ Energy: <span id="energyDisplay">100</span></span>
            <span>🏆 <span id="recordDisplay">0</span></span>
        </div>
    </div>
    <script>
    // ============================================================
    // 1. ИНИЦИАЛИЗАЦИЯ
    // ============================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    function resizeCanvas() {
        const field = document.getElementById('game-field');
        canvas.width = field.clientWidth;
        canvas.height = field.clientHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ============================================================
    // 2. ИГРОВЫЕ ОБЪЕКТЫ
    // ============================================================
    const game = {
        kills: 0,
        deaths: 0,
        record: parseInt(localStorage.getItem('pudgeRecord')) || 0,
        hp: 100,
        maxHp: 100,
        energy: 100,
        maxEnergy: 100,
        hero: { x: 0, y: 0, radius: 18 },
        bots: [],
        particles: [],
        hook: null,
        aimAngle: 0,
        gameOver: false,
        leftJoystick: { active: false, dx: 0, dy: 0, touchId: null, startX: 0, startY: 0 },
        rightJoystick: { active: false, dx: 0, dy: 0, touchId: null, startX: 0, startY: 0 },
        spawnTimer: 0,
        maxBots: 3
    };
    document.getElementById('recordDisplay').textContent = game.record;

    // ============================================================
    // 3. ДЖОЙСТИКИ
    // ============================================================
    function handleTouchStart(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        for (const touch of e.changedTouches) {
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            if (x < canvas.width / 2) {
                game.leftJoystick.active = true;
                game.leftJoystick.touchId = touch.identifier;
                game.leftJoystick.startX = x;
                game.leftJoystick.startY = y;
                game.leftJoystick.dx = 0; game.leftJoystick.dy = 0;
            } else {
                game.rightJoystick.active = true;
                game.rightJoystick.touchId = touch.identifier;
                game.rightJoystick.startX = x;
                game.rightJoystick.startY = y;
                game.rightJoystick.dx = 0; game.rightJoystick.dy = 0;
            }
        }
    }

    function handleTouchMove(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        for (const touch of e.changedTouches) {
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            if (game.leftJoystick.touchId === touch.identifier && game.leftJoystick.active) {
                const dx = x - game.leftJoystick.startX;
                const dy = y - game.leftJoystick.startY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5) {
                    const angle = Math.atan2(dy, dx);
                    const speed = 2.5;
                    const moveDist = Math.min(dist / 20, 1) * speed;
                    game.hero.x += Math.cos(angle) * moveDist;
                    game.hero.y += Math.sin(angle) * moveDist;
                    const margin = 30;
                    game.hero.x = Math.max(margin, Math.min(canvas.width - margin, game.hero.x));
                    game.hero.y = Math.max(margin, Math.min(canvas.height - margin, game.hero.y));
                }
                const maxDist = 50;
                if (dist > maxDist) {
                    game.leftJoystick.dx = (dx / dist) * maxDist;
                    game.leftJoystick.dy = (dy / dist) * maxDist;
                } else {
                    game.leftJoystick.dx = dx;
                    game.leftJoystick.dy = dy;
                }
            }
            if (game.rightJoystick.touchId === touch.identifier && game.rightJoystick.active) {
                const dx = x - game.rightJoystick.startX;
                const dy = y - game.rightJoystick.startY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5) game.aimAngle = Math.atan2(dy, dx);
                const maxDist = 60;
                if (dist > maxDist) {
                    game.rightJoystick.dx = (dx / dist) * maxDist;
                    game.rightJoystick.dy = (dy / dist) * maxDist;
                } else {
                    game.rightJoystick.dx = dx;
                    game.rightJoystick.dy = dy;
                }
            }
        }
    }

    function handleTouchEnd(e) {
        e.preventDefault();
        for (const touch of e.changedTouches) {
            if (game.leftJoystick.touchId === touch.identifier) {
                game.leftJoystick.active = false;
                game.leftJoystick.dx = 0; game.leftJoystick.dy = 0;
                game.leftJoystick.touchId = null;
            }
            if (game.rightJoystick.touchId === touch.identifier) {
                const dist = Math.sqrt(game.rightJoystick.dx*game.rightJoystick.dx + game.rightJoystick.dy*game.rightJoystick.dy);
                if (dist > 20) useHook(game.aimAngle);
                game.rightJoystick.active = false;
                game.rightJoystick.dx = 0; game.rightJoystick.dy = 0;
                game.rightJoystick.touchId = null;
            }
        }
    }

    canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
    canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
    canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
    canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

    // ============================================================
    // 4. ФУНКЦИИ ИГРЫ
    // ============================================================
    function useHook(angle) {
        if (game.hook || game.gameOver) return;
        const startX = game.hero.x, startY = game.hero.y;
        const length = 300;
        const endX = startX + Math.cos(angle) * length;
        const endY = startY + Math.sin(angle) * length;
        game.hook = { x1: startX, y1: startY, x2: endX, y2: endY, life: 20 };

        for (const bot of game.bots) {
            if (!bot.alive) continue;
            const dist = distanceToSegment(bot.x, bot.y, startX, startY, endX, endY);
            if (dist < 30) {
                bot.alive = false;
                bot.respawnTimer = 180;
                game.kills++;
                updateScore();
                spawnParticles(bot.x, bot.y, '#ff1a1a', 30);
                game.hp = Math.min(game.maxHp, game.hp + 10);
                updateHP();
                break;
            }
        }
    }

    function distanceToSegment(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        const lenSq = dx*dx + dy*dy;
        if (lenSq === 0) return Math.sqrt((px-x1)*(px-x1) + (py-y1)*(py-y1));
        let t = ((px-x1)*dx + (py-y1)*dy) / lenSq;
        t = Math.max(0, Math.min(1, t));
        const projX = x1 + t*dx, projY = y1 + t*dy;
        return Math.sqrt((px-projX)*(px-projX) + (py-projY)*(py-projY));
    }

    function spawnParticles(x, y, color, count = 15) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1 + Math.random() * 2.5;
            game.particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 20 + Math.random() * 20,
                maxLife: 40,
                radius: 2 + Math.random() * 3,
                color: color
            });
        }
    }

    // ============================================================
    // 5. БОТЫ
    // ============================================================
    function createBots() {
        game.bots = [];
        const botColors = ['#8B0000', '#006400', '#4a0080'];
        const positions = [
            { x: 80, y: 80 },
            { x: canvas.width - 80, y: 80 },
            { x: 80, y: canvas.height - 80 }
        ];
        for (let i = 0; i < 3; i++) {
            game.bots.push({
                x: positions[i].x,
                y: positions[i].y,
                radius: 18,
                color: botColors[i],
                alive: true,
                hookCooldown: 0,
                maxHookCooldown: 60 + Math.random() * 40,
                moveTimer: 0,
                aimAngle: 0,
                hook: null,
                respawnTimer: 0,
                targetX: positions[i].x,
                targetY: positions[i].y
            });
        }
    }

    function updateBots() {
        for (const bot of game.bots) {
            if (!bot.alive) {
                bot.respawnTimer--;
                if (bot.respawnTimer <= 0) {
                    bot.alive = true;
                    bot.x = 50 + Math.random() * (canvas.width - 100);
                    bot.y = 50 + Math.random() * (canvas.height - 100);
                    bot.hookCooldown = 0;
                }
                continue;
            }

            const dx = game.hero.x - bot.x;
            const dy = game.hero.y - bot.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > 80) {
                const speed = 0.6;
                bot.x += (dx / dist) * speed;
                bot.y += (dy / dist) * speed;
            } else if (dist < 50) {
                const speed = 0.4;
                bot.x -= (dx / dist) * speed;
                bot.y -= (dy / dist) * speed;
            }

            bot.aimAngle = Math.atan2(dy, dx);
            bot.hookCooldown--;
            
            if (bot.hookCooldown <= 0 && dist < 300 && dist > 30) {
                bot.hookCooldown = bot.maxHookCooldown;
                const startX = bot.x, startY = bot.y;
                const length = 260;
                const endX = startX + Math.cos(bot.aimAngle) * length;
                const endY = startY + Math.sin(bot.aimAngle) * length;
                
                const distToHero = distanceToSegment(game.hero.x, game.hero.y, startX, startY, endX, endY);
                if (distToHero < 30) {
                    game.hp -= 25;
                    if (game.hp <= 0) {
                        game.hp = 0;
                        game.deaths++;
                        updateDeaths();
                        updateHP();
                        game.gameOver = true;
                        showModal('Тебя убил хук бота!');
                    } else {
                        updateHP();
                        spawnParticles(game.hero.x, game.hero.y, '#ff1a1a', 15);
                    }
                }
                bot.hook = { x1: startX, y1: startY, x2: endX, y2: endY, life: 20 };
            }
            if (bot.hook) {
                bot.hook.life--;
                if (bot.hook.life <= 0) bot.hook = null;
            }
        }
    }

    // ============================================================
    // 6. UI
    // ============================================================
    function updateScore() {
        document.getElementById('killsDisplay').textContent = game.kills;
        if (game.kills > game.record) {
            game.record = game.kills;
            localStorage.setItem('pudgeRecord', game.record);
            document.getElementById('recordDisplay').textContent = game.record;
        }
    }

    function updateDeaths() {
        document.getElementById('deathsDisplay').textContent = game.deaths;
    }

    function updateHP() {
        document.getElementById('hpDisplay').textContent = Math.round(game.hp);
    }

    function updateEnergy() {
        document.getElementById('energyDisplay').textContent = Math.round(game.energy);
    }

    function showModal(text) {
        document.getElementById('modal-text').textContent = text;
        document.getElementById('modal-overlay').classList.add('active');
    }

    function hideModal() {
        document.getElementById('modal-overlay').classList.remove('active');
    }

    function resetGame() {
        game.hp = game.maxHp;
        game.kills = 0;
        game.deaths = 0;
        game.gameOver = false;
        game.particles = [];
        game.hook = null;
        game.hero.x = canvas.width / 2;
        game.hero.y = canvas.height / 2;
        updateHP();
        updateScore();
        updateDeaths();
        document.getElementById('killsDisplay').textContent = '0';
        document.getElementById('deathsDisplay').textContent = '0';
        hideModal();
        createBots();
    }

    // ============================================================
    // 7. ИГРОВОЙ ЦИКЛ
    // ============================================================
    function update() {
        if (!game.gameOver) {
            updateBots();

            game.spawnTimer++;
            const aliveBots = game.bots.filter(b => b.alive).length;
            if (game.spawnTimer > 120 && aliveBots < game.maxBots) {
                game.spawnTimer = 0;
                for (const bot of game.bots) {
                    if (!bot.alive) {
                        bot.alive = true;
                        bot.x = 50 + Math.random() * (canvas.width - 100);
                        bot.y = 50 + Math.random() * (canvas.height - 100);
                        bot.hookCooldown = 0;
                        break;
                    }
                }
            }

            for (let i = game.particles.length - 1; i >= 0; i--) {
                const p = game.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) game.particles.splice(i, 1);
            }

            game.energy = Math.min(game.maxEnergy, game.energy + 0.08);
            updateEnergy();
            if (game.energy > 80 && game.hp < game.maxHp) {
                game.hp = Math.min(game.maxHp, game.hp + 0.2);
                updateHP();
            }

            if (game.hook) {
                game.hook.life--;
                if (game.hook.life <= 0) game.hook = null;
            }
        }
    }

    // ============================================================
    // 8. ОТРИСОВКА
    // ============================================================
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Фон
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Сетка
        ctx.strokeStyle = 'rgba(40, 40, 40, 0.5)';
        ctx.lineWidth = 1;
        for (let x = 0; x < canvas.width; x += 40) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += 40) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }

        // Боты
        for (const bot of game.bots) {
            if (!bot.alive) continue;
            const r = bot.radius;
            drawCircle(bot.x, bot.y, r, bot.color);
            drawCircle(bot.x, bot.y, r-4, '#4CAF50');
            // Глаза
            ctx.fillStyle = 'white';
            ctx.fillRect(bot.x - 6, bot.y - 6, 4, 4);
            ctx.fillRect(bot.x + 2, bot.y - 6, 4, 4);
            ctx.fillStyle = 'black';
            ctx.fillRect(bot.x - 4, bot.y - 5, 2, 2);
            ctx.fillRect(bot.x + 4, bot.y - 5, 2, 2);
            if (bot.hook) {
                drawLine(bot.hook.x1, bot.hook.y1, bot.hook.x2, bot.hook.y2, '#ff6b6b');
                drawCircle(bot.hook.x2, bot.hook.y2, 6, '#ff6b6b');
            }
        }

        // Крюк игрока
        if (game.hook) {
            drawLine(game.hook.x1, game.hook.y1, game.hook.x2, game.hook.y2, '#ff6b6b');
            drawCircle(game.hook.x2, game.hook.y2, 8, '#ff6b6b');
        }

        // Герой
        const h = game.hero;
        const r = 18;
        drawCircle(h.x, h.y, r, '#006400');
        drawCircle(h.x, h.y, r-4, '#4CAF50');
        ctx.fillStyle = 'white';
        ctx.fillRect(h.x - 6, h.y - 6, 4, 4);
        ctx.fillRect(h.x + 2, h.y - 6, 4, 4);
        ctx.fillStyle = 'black';
        ctx.fillRect(h.x - 4, h.y - 5, 2, 2);
        ctx.fillRect(h.x + 4, h.y - 5, 2, 2);

        // Прицел
        if (game.rightJoystick.active && game.rightJoystick.dx !== 0) {
            const angle = game.aimAngle;
            const len = 50;
            const endX = h.x + Math.cos(angle) * len;
            const endY = h.y + Math.sin(angle) * len;
            ctx.strokeStyle = 'rgba(255, 107, 107, 0.5)';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(h.x, h.y);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            ctx.setLineDash([]);
            drawCircle(endX, endY, 6, 'rgba(255, 107, 107, 0.3)');
        }

        // Частицы
        for (const p of game.particles) {
            ctx.globalAlpha = p.life / p.maxLife;
            ctx.fillStyle = p.color;
            ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.floor(p.radius), Math.floor(p.radius));
            ctx.globalAlpha = 1;
        }

        // Джойстики
        if (game.leftJoystick.active) {
            const jx = game.leftJoystick.startX;
            const jy = game.leftJoystick.startY;
            ctx.strokeStyle = 'rgba(0, 255, 65, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(jx, jy, 45, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = 'rgba(0, 255, 65, 0.15)';
            ctx.beginPath();
            ctx.arc(jx + game.leftJoystick.dx, jy + game.leftJoystick.dy, 18, 0, Math.PI * 2);
            ctx.fill();
        }
        if (game.rightJoystick.active) {
            const jx = game.rightJoystick.startX;
            const jy = game.rightJoystick.startY;
            ctx.strokeStyle = 'rgba(255, 107, 107, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(jx, jy, 45, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = 'rgba(255, 107, 107, 0.15)';
            ctx.beginPath();
            ctx.arc(jx + game.rightJoystick.dx, jy + game.rightJoystick.dy, 18, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // ============================================================
    // 9. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
    // ============================================================
    function drawCircle(cx, cy, r, color) {
        const startX = Math.floor(cx - r), startY = Math.floor(cy - r);
        const endX = Math.floor(cx + r), endY = Math.floor(cy + r);
        ctx.fillStyle = color;
        for (let y = startY; y <= endY; y++) {
            for (let x = startX; x <= endX; x++) {
                const dx = x - cx, dy = y - cy;
                if (dx*dx + dy*dy <= r*r) ctx.fillRect(x, y, 1, 1);
            }
        }
    }

    function drawLine(x1, y1, x2, y2, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(Math.floor(x1), Math.floor(y1));
        ctx.lineTo(Math.floor(x2), Math.floor(y2));
        ctx.stroke();
    }

    // ============================================================
    // 10. ЗАПУСК
    // ============================================================
    game.hero.x = canvas.width / 2;
    game.hero.y = canvas.height / 2;
    createBots();

    document.getElementById('btnOk').addEventListener('click', resetGame);

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
