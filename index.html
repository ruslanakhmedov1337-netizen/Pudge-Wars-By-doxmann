<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pudge Wars Mobile Ultimate Edition</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: monospace; user-select: none; touch-action: none; }
        
        canvas { display: block; width: 100vw; height: 100vh; background: #1a3814; }
        
        /* Тач-джойстики под большие пальцы */
        .joy-zone { position: absolute; bottom: 30px; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; }
        #left-joy { left: 40px; }
        #right-joy { right: 40px; }
        .stick { width: 36px; height: 36px; background: rgba(255,255,255,0.25); border-radius: 50%; }

        /* Панель способностей */
        #skills-panel { position: absolute; bottom: 145px; right: 40px; display: flex; gap: 10px; z-index: 10; }
        .skill-wrapper { position: relative; width: 44px; height: 44px; }
        .skill { width: 100%; height: 100%; border: 1.5px solid #444; border-radius: 4px; background-size: cover; background-position: center; background-color: #111; box-shadow: 0 3px 8px rgba(0,0,0,0.6); }
        
        /* Фильтр multiply убирает белый фон у иконки хука */
        #skill-q { background-image: url('hook_icon.JPG.png'); background-color: #fff; mix-blend-mode: multiply; }
        #skill-w { background-image: url('shift_icon.png'); }
        #skill-e { background-image: url('blink_icon.png'); }
        
        .cooldown-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; border-radius: 3px; display: none; z-index: 12; }
        .hotkey { position: absolute; bottom: 1px; right: 3px; color: #ffcc00; font-size: 9px; font-weight: bold; text-shadow: 1px 1px 1px #000; z-index: 11; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="skills-panel">
        <div class="skill-wrapper">
            <div class="skill" id="skill-q"></div>
            <div class="cooldown-overlay" id="cd-q">0</div>
            <div class="hotkey">Q</div>
        </div>
        <div class="skill-wrapper">
            <div class="skill" id="skill-w"></div>
            <div class="cooldown-overlay" id="cd-w">0</div>
            <div class="hotkey">W</div>
        </div>
        <div class="skill-wrapper">
            <div class="skill" id="skill-e"></div>
            <div class="cooldown-overlay" id="cd-e">0</div>
            <div class="hotkey">E</div>
        </div>
    </div>

    <div class="joy-zone" id="left-joy"><div class="stick" id="left-stick"></div></div>
    <div class="joy-zone" id="right-joy"><div class="stick" id="right-stick" style="background: rgba(235,196,47,0.25);"></div></div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Твои финальные имена файлов с Гитхаба
        const pudgeSprite = new Image();
        pudgeSprite.src = 'pudge_sprite.png.JPG.png';

        const hookSprite = new Image();
        hookSprite.src = 'hook_icon.JPG.png';

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let state = {
            score: 0, record: 0,
            pudge: { x: window.innerWidth / 2, y: window.innerHeight * 0.78, radius: 26, speed: 4.5, isPhaseShift: false, phaseShiftTimer: 0, lastDir: { x: 0, y: -1 } },
            enemies: [],
            hook: { x: 0, y: 0, vx: 0, vy: 0, active: false, startX: 0, startY: 0, maxLen: window.innerHeight * 0.82, returning: false },
            aim: { active: false, dx: 0, dy: 0 },
            cooldowns: { q: { current: 0, max: 3 }, w: { current: 0, max: 5 }, e: { current: 0, max: 7 } }
        };

        function createEnemy(index, total) {
            let sector = canvas.width / total;
            return {
                id: Math.random(),
                x: sector * index + sector / 2,
                y: canvas.height * 0.12 + Math.random() * 50,
                radius: 26,
                speed: 0.8 + Math.random() * 0.7,
                vx: (Math.random() > 0.5 ? 1 : -1),
                vy: (Math.random() > 0.5 ? 1 : -1),
                dirTimer: Math.random() * 60,
                hook: { x: 0, y: 0, vx: 0, vy: 0, active: false, startX: 0, startY: 0, maxLen: window.innerHeight * 0.82, returning: false },
                shootTimer: 100 + Math.random() * 150
            };
        }

        function initEnemies() {
            state.enemies = [];
            for(let i = 0; i < 3; i++) {
                state.enemies.push(createEnemy(i, 3));
            }
        }
        initEnemies();

        let moveVector = { x: 0, y: 0 };

        setupJoystick("left-joy", "left-stick", (dx, dy) => {
            moveVector.x = dx; moveVector.y = dy;
            if (dx !== 0 || dy !== 0) {
                let len = Math.sqrt(dx*dx + dy*dy);
                state.pudge.lastDir = { x: dx / len, y: dy / len };
            }
        });

        setupJoystick("right-joy", "right-stick", (dx, dy, isRelease) => {
            if (dx !== 0 || dy !== 0) {
                state.aim.active = true;
                state.aim.dx = dx;
                state.aim.dy = dy;
            }
            if (isRelease) {
                state.aim.active = false;
                if (!state.hook.active && state.cooldowns.q.current === 0 && (dx !== 0 || dy !== 0)) {
                    state.hook.active = true; state.hook.returning = false;
                    state.hook.x = state.pudge.x; state.hook.y = state.pudge.y;
                    state.hook.startX = state.pudge.x; state.hook.startY = state.pudge.y;
                    let angle = Math.atan2(dy, dx);
                    state.hook.vx = Math.cos(angle) * 15; state.hook.vy = Math.sin(angle) * 15;
                    startCooldown('q');
                }
            }
        });

        document.getElementById("skill-w").addEventListener("touchstart", (e) => { e.preventDefault(); usePhaseShift(); });
        document.getElementById("skill-e").addEventListener("touchstart", (e) => { e.preventDefault(); useBlink(); });

        function usePhaseShift() {
            if (state.cooldowns.w.current > 0 || state.pudge.isPhaseShift) return;
            state.pudge.isPhaseShift = true;
            state.pudge.phaseShiftTimer = 75; 
            startCooldown('w');
        }

        function useBlink() {
            if (state.cooldowns.e.current > 0 || state.pudge.isPhaseShift) return;
            state.pudge.x += state.pudge.lastDir.x * 140;
            state.pudge.y += state.pudge.lastDir.y * 140;
            keepInBounds();
            startCooldown('e');
        }

        function startCooldown(ability) {
            state.cooldowns[ability].current = state.cooldowns[ability].max;
            let overlay = document.getElementById(`cd-${ability}`);
            overlay.style.display = "flex"; overlay.innerText = state.cooldowns[ability].current;
            let interval = setInterval(() => {
                state.cooldowns[ability].current--;
                if (state.cooldowns[ability].current <= 0) {
                    overlay.style.display = "none"; clearInterval(interval);
                } else { overlay.innerText = state.cooldowns[ability].current; }
            }, 1000);
        }

        function keepInBounds() {
            let riverBottom = canvas.height * 0.56;
            if(state.pudge.x < 25) state.pudge.x = 25;
            if(state.pudge.x > canvas.width - 25) state.pudge.x = canvas.width - 25;
            if(state.pudge.y < riverBottom + 25) state.pudge.y = riverBottom + 25;
            if(state.pudge.y > canvas.height - 25) state.pudge.y = canvas.height - 25;
        }

        function setupJoystick(containerId, stickId, callback) {
            const container = document.getElementById(containerId);
            const stick = document.getElementById(stickId);
            let active = false;
            container.addEventListener("touchstart", () => active = true);
            container.addEventListener("touchmove", (e) => {
                if (!active) return;
                let t = e.touches[0]; let rect = container.getBoundingClientRect();
                let dx = t.clientX - (rect.left + rect.width/2); let dy = t.clientY - (rect.top + rect.height/2);
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist > 30) { dx = (dx/dist)*30; dy = (dy/dist)*30; }
                stick.style.transform = `translate(${dx}px, ${dy}px)`;
                callback(dx/30, dy/30, false);
            });
            container.addEventListener("touchend", () => {
                active = false; 
                let m = new WebKitCSSMatrix(window.getComputedStyle(stick).transform);
                stick.style.transform = "translate(0px, 0px)";
                callback(m.m41 || 0, m.m42 || 0, true);
                if(containerId === "left-joy") { moveVector.x = 0; moveVector.y = 0; }
            });
        }

        function update() {
            if (state.pudge.isPhaseShift) {
                state.pudge.phaseShiftTimer--;
                if (state.pudge.phaseShiftTimer <= 0) state.pudge.isPhaseShift = false;
            } else {
                state.pudge.x += moveVector.x * state.pudge.speed;
                state.pudge.y += moveVector.y * state.pudge.speed;
                keepInBounds();
            }

            let riverTop = canvas.height * 0.44;
            state.enemies.forEach((env, index) => {
                if (!env) return;

                env.dirTimer--;
                if (env.dirTimer <= 0) {
                    let angle = Math.random() * Math.PI * 2;
                    env.vx = Math.cos(angle);
                    env.vy = Math.sin(angle);
                    env.dirTimer = 40 + Math.random() * 80;
                }

                env.x += env.vx * env.speed;
                env.y += env.vy * env.speed;

                if (env.x < 25) { env.x = 25; env.vx *= -1; }
                if (env.x > canvas.width - 25) { env.x = canvas.width - 25; env.vx *= -1; }
                if (env.y < 25) { env.y = 25; env.vy *= -1; }
                if (env.y > riverTop - 25) { env.y = riverTop - 25; env.vy *= -1; }

                env.shootTimer--;
                if (env.shootTimer <= 0 && !env.hook.active) {
                    env.hook.active = true;
                    env.hook.returning = false;
                    env.hook.x = env.x; env.hook.y = env.y;
                    env.hook.startX = env.x; env.hook.startY = env.y;
                    
                    let targetAngle = Math.atan2(state.pudge.y - env.y, state.pudge.x - env.x);
                    env.hook.vx = Math.cos(targetAngle) * 11;
                    env.hook.vy = Math.sin(targetAngle) * 11;
                    env.shootTimer = 180 + Math.random() * 150;
                }

                if (env.hook.active) {
                    if (!env.hook.returning) {
                        env.hook.x += env.hook.vx; env.hook.y += env.hook.vy;
                        let hLen = Math.sqrt((env.hook.x - env.hook.startX)**2 + (env.hook.y - env.hook.startY)**2);
                        if (hLen >= env.hook.maxLen) env.hook.returning = true;

                        let tDist = Math.sqrt((env.hook.x - state.pudge.x)**2 + (env.hook.y - state.pudge.y)**2);
                        if (tDist < state.pudge.radius + 10 && !state.pudge.isPhaseShift) {
                            env.hook.returning = true;
                            if (state.score > 0) state.score--;
                        }
                    } else {
                        let tdx = env.x - env.hook.x; let tdy = env.y - env.hook.y;
                        let tdist = Math.sqrt(tdx*tdx + tdy*tdy);
                        if (tdist < 20) env.hook.active = false;
                        else { env.hook.x += (tdx/tdist) * 15; env.hook.y += (tdy/tdist) * 15; }
                    }
                }
            });

            if (state.hook.active) {
                if (!state.hook.returning) {
                    state.hook.x += state.hook.vx; state.hook.y += state.hook.vy;
                    let curLen = Math.sqrt((state.hook.x - state.hook.startX)**2 + (state.hook.y - state.hook.startY)**2);
                    if (curLen >= state.hook.maxLen) state.hook.returning = true;

                    state.enemies.forEach((env, index) => {
                        if (!env) return;
                        let dist = Math.sqrt((state.hook.x - env.x)**2 + (state.hook.y - env.y)**2);
                        if (dist < env.radius + 12) {
                            state.score++; 
                            if(state.score > state.record) state.record = state.score;
                            state.hook.returning = true;
                            
                            state.enemies[index] = null;
                            setTimeout(() => {
                                state.enemies[index] = createEnemy(index, 3);
                            }, 2000);
                        }
                    });
                } else {
                    let dx = state.pudge.x - state.hook.x; let dy = state.pudge.y - state.hook.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 20) state.hook.active = false;
                    else { state.hook.x += (dx/dist) * 16; state.hook.y += (dy/dist) * 16; }
                }
            }
        }

        // Отрисовка Пуджей без вращения картинок и с удалением белого цвета
        function drawPudgeCharacter(ctx, x, y, radius, isShift, isEnemy) {
            ctx.save();
            ctx.translate(x, y);
            
            if (isShift) ctx.globalAlpha = 0.35;

            if (pudgeSprite.complete && pudgeSprite.naturalWidth !== 0) {
                ctx.globalCompositeOperation = "multiply"; // Магия удаления белого фона
                
                if (isEnemy) {
                    ctx.filter = "hue-rotate(300deg) saturate(1.8) brightness(0.9)";
                }
                
                // Рисуем картинку ровно (без вращения)
                ctx.drawImage(pudgeSprite, -radius, -radius, radius * 2, radius * 2);
            } else {
                ctx.fillStyle = isEnemy ? "#a64646" : "#a66846";
                ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
            ctx.globalAlpha = 1.0;
            ctx.filter = "none";
            ctx.globalCompositeOperation = "source-over"; // Сброс блендинга
        }

        function drawHook(startX, startY, hookX, hookY, vx, vy) {
            ctx.strokeStyle = "#a1a1a1"; ctx.lineWidth = 3.5;
            ctx.setLineDash([4, 6]); 
            ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(hookX, hookY); ctx.stroke();
            ctx.setLineDash([]);

            ctx.save();
            ctx.translate(hookX, hookY);
            let hAngle = Math.atan2(vy, vx);
            ctx.rotate(hAngle + Math.PI / 2); // Крюк смотрит в сторону полета
            
            if (hookSprite.complete && hookSprite.naturalWidth !== 0) {
                ctx.globalCompositeOperation = "multiply"; // Магия удаления белого фона у хука
                ctx.drawImage(hookSprite, -16, -16, 32, 32);
            } else {
                ctx.fillStyle = "#d4af37"; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
            ctx.globalCompositeOperation = "source-over";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Трава
            ctx.fillStyle = "#2c5421"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#274a1d"; ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 30) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }

            // Река
            let rTop = canvas.height * 0.44;
            let rBottom = canvas.height * 0.56;
            ctx.fillStyle = "#182e44"; ctx.fillRect(0, rTop, canvas.width, rBottom - rTop);
            ctx.fillStyle = "#1c364f"; ctx.fillRect(0, rTop + 8, canvas.width, (rBottom - rTop) - 16);

            // Счет
            ctx.fillStyle = "#39eb52"; ctx.font = "bold 14px monospace"; ctx.fillText(`Score: ${state.score}`, 20, 30);
            ctx.fillStyle = "#ebc42f"; ctx.fillText(`Record: ${state.record}`, 130, 30);

            if (state.aim.active && !state.hook.active) {
                let angle = Math.atan2(state.aim.dy, state.aim.dx);
                ctx.strokeStyle = "rgba(235, 64, 52, 0.75)"; ctx.lineWidth = 2.5;
                ctx.setLineDash([6, 6]);
                ctx.beginPath();
                ctx.moveTo(state.pudge.x, state.pudge.y);
                ctx.lineTo(state.pudge.x + Math.cos(angle) * state.hook.maxLen, state.pudge.y + Math.sin(angle) * state.hook.maxLen);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            if (state.hook.active) {
                drawHook(state.pudge.x, state.pudge.y, state.hook.x, state.hook.y, state.hook.vx, state.hook.vy);
            }

            state.enemies.forEach(env => {
                if (env && env.hook.active) {
                    drawHook(env.x, env.y, env.hook.x, env.hook.y, env.hook.vx, env.hook.vy);
                }
            });

            // Подложка под игроком
            ctx.fillStyle = state.pudge.isPhaseShift ? "rgba(0,191,255,0.15)" : "rgba(40, 167, 69, 0.22)";
            ctx.beginPath(); ctx.arc(state.pudge.x, state.pudge.y, state.pudge.radius + 6, 0, Math.PI*2); ctx.fill();
            
            drawPudgeCharacter(ctx, state.pudge.x, state.pudge.y, state.pudge.radius, state.pudge.isPhaseShift, false);

            state.enemies.forEach(env => {
                if (!env) return;
                ctx.fillStyle = "rgba(220, 53, 69, 0.18)";
                ctx.beginPath(); ctx.arc(env.x, env.y, env.radius + 6, 0, Math.PI*2); ctx.fill();
                drawPudgeCharacter(ctx, env.x, env.y, env.radius, false, true);
            });
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
