<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pudge Wars — Dota Style</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }
        #game {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 900px;
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            image-rendering: pixelated;
        }
        #top-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: #0a0a0a;
            border-bottom: 2px solid #1a1a1a;
            color: #888;
            font-size: 10px;
            letter-spacing: 1px;
            min-height: 36px;
            image-rendering: pixelated;
        }
        .score-dota {
            display: flex;
            gap: 8px;
            font-size: 14px;
            font-weight: bold;
        }
        .score-dota .kills { color: #00ff41; }
        .score-dota .deaths { color: #ff1a1a; }
        .score-dota .sep { color: #444; }
        .crypto-icons { display: flex; gap: 4px; font-size: 9px; color: #444; font-weight: bold; }
        .crypto-icons .active { color: #00ff41; text-shadow: 0 0 10px rgba(0,255,65,0.2); }
        #game-field {
            flex: 1;
            background: #0a0a0a;
            position: relative;
            overflow: hidden;
            touch-action: none;
            image-rendering: pixelated;
        }
        #game-field canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            image-rendering: pixelated;
        }
        #status-bar {
            display: flex;
            justify-content: space-between;
            padding: 3px 10px;
            background: #0a0a0a;
            border-top: 2px solid #1a1a1a;
            color: #444;
            font-size: 8px;
            letter-spacing: 1px;
            image-rendering: pixelated;
        }
        #status-bar .hp { color: #ff1a1a; }
        #status-bar .energy { color: #00ff41; }
        #bottom-panel {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 4px 4px;
            background: #111;
            border-top: 2px solid #1a1a1a;
            min-height: 64px;
            gap: 3px;
            image-rendering: pixelated;
        }
        .skill-btn {
            background: #0a0a0a;
            border: 2px solid #2a2a2a;
            border-radius: 6px;
            color: #888;
            font-size: 7px;
            font-family: 'Courier New', monospace;
            padding: 4px 4px;
            text-align: center;
            cursor: pointer;
            flex: 1;
            max-width: 60px;
            touch-action: manipulation;
            min-height: 52px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            image-rendering: pixelated;
            transition: all 0.1s ease;
        }
        .skill-btn .icon-wrap {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2px;
            image-rendering: pixelated;
        }
        .skill-btn .icon-wrap svg {
            width: 24px;
            height: 24px;
            display: block;
        }
        .skill-btn .key { font-size: 6px; color: #444; letter-spacing: 1px; }
        .skill-btn .cd { font-size: 6px; color: #666; margin-top: 1px; }
        .skill-btn:active { transform: scale(0.92); border-color: #00ff41; background: #1a1a1a; box-shadow: 0 0 20px rgba(0,255,65,0.1); }
        .skill-btn .cd-active { color: #ff1a1a; }
        .skill-btn.hook .key { color: #ff6b6b; }
        .skill-btn.shift .key { color: #00b894; }
        .skill-btn.blink .key { color: #6c5ce7; }
        .skill-btn.passive .key { color: #ffd93d; }
        @media (max-width: 400px) {
            .skill-btn { padding: 3px 2px; min-height: 44px; max-width: 50px; }
            .skill-btn .icon-wrap { width: 22px; height: 22px; }
            .skill-btn .icon-wrap svg { width: 18px; height: 18px; }
            .skill-btn .key { font-size: 5px; }
            #top-panel { font-size: 8px; padding: 4px 6px; }
            #bottom-panel { min-height: 50px; padding: 3px 2px; }
            .score-dota { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="game">
        <div id="top-panel">
            <div class="score-dota">
                <span class="kills" id="killsDisplay">0</span>
                <span class="sep">/</span>
                <span class="deaths" id="deathsDisplay">0</span>
            </div>
            <div class="crypto-icons">
                <span class="active">₿TC</span><span>TON</span><span>TRC20</span><span>ETH</span><span>BEP20</span><span>LTC</span>
            </div>
        </div>
        <div id="game-field"><canvas id="gameCanvas"></canvas></div>
        <div id="status-bar">
            <span class="hp">❤️ HP: <span id="hpDisplay">100</span></span>
            <span class="energy">⚡ Energy: <span id="energyDisplay">100</span></span>
            <span>⚔️ Pudge Wars</span>
        </div>
        <div id="bottom-panel">
            <!-- 1️⃣ ХУК (Meat Hook) — 3.5с -->
            <button class="skill-btn hook" data-skill="hook">
                <span class="icon-wrap">
                    <svg viewBox="0 0 32 32" fill="none">
                        <circle cx="16" cy="16" r="14" fill="#1a1a1a" stroke="#ff6b6b" stroke-width="1.5"/>
                        <path d="M10 8L22 20M22 20L18 22M22 20L20 24" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="8" cy="6" r="3" fill="#ff6b6b" stroke="none"/>
                        <path d="M8 6L16 14" stroke="#ff6b6b" stroke-width="1.5"/>
                    </svg>
                </span>
                <span class="key">ХУК</span>
                <span class="cd" id="hookCd">3.5s</span>
            </button>
            <!-- 2️⃣ ШИФТ/ПАКА (Phase Shift) — 4.5с -->
            <button class="skill-btn shift" data-skill="shift">
                <span class="icon-wrap">
                    <svg viewBox="0 0 32 32" fill="none">
                        <circle cx="16" cy="16" r="14" fill="#1a1a1a" stroke="#00b894" stroke-width="1.5"/>
                        <path d="M16 4C16 4 12 10 12 14C12 17 14 19 16 19C18 19 20 17 20 14C20 10 16 4 16 4Z" stroke="#00b894" stroke-width="2" fill="rgba(0,184,148,0.15)"/>
                        <path d="M10 24L22 24" stroke="#00b894" stroke-width="2" stroke-linecap="round"/>
                        <path d="M14 20L14 24M18 20L18 24" stroke="#00b894" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="14" cy="13" r="1.5" fill="#00b894"/>
                        <circle cx="18" cy="13" r="1.5" fill="#00b894"/>
                    </svg>
                </span>
                <span class="key">ШИФТ</span>
                <span class="cd" id="shiftCd">4.5s</span>
            </button>
            <!-- 3️⃣ БЛИНК ДАГГЕР (Blink Dagger) — 3с -->
            <button class="skill-btn blink" data-skill="blink">
                <span class="icon-wrap">
                    <svg viewBox="0 0 32 32" fill="none">
                        <circle cx="16" cy="16" r="14" fill="#1a1a1a" stroke="#6c5ce7" stroke-width="1.5"/>
                        <path d="M6 16L12 10L16 14L14 18L10 16L6 16Z" stroke="#6c5ce7" stroke-width="1.5" fill="rgba(108,92,231,0.2)"/>
                        <path d="M26 16L20 22L16 18L18 14L22 16L26 16Z" stroke="#6c5ce7" stroke-width="1.5" fill="rgba(108,92,231,0.2)"/>
                        <path d="M12 10L20 22" stroke="#6c5ce7" stroke-width="1" stroke-dasharray="2 2"/>
                        <circle cx="12" cy="10" r="2" fill="#6c5ce7"/>
                        <circle cx="20" cy="22" r="2" fill="#6c5ce7"/>
                    </svg>
                </span>
                <span class="key">БЛИНК</span>
                <span class="cd" id="blinkCd">3.0s</span>
            </button>
            <!-- 4️⃣ ПАССИВКА — без кд -->
            <button class="skill-btn passive" data-skill="passive">
                <span class="icon-wrap">
                    <svg viewBox="0 0 32 32" fill="none">
                        <circle cx="16" cy="16" r="14" fill="#1a1a1a" stroke="#ffd93d" stroke-width="1.5"/>
                        <path d="M16 6L16 10M16 10L12 14M16 10L20 14" stroke="#ffd93d" stroke-width="2" stroke-linecap="round"/>
                        <path d="M8 20L12 16M24 20L20 16" stroke="#ffd93d" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="16" cy="22" r="3" fill="#ffd93d" stroke="none" opacity="0.3"/>
                        <circle cx="16" cy="22" r="1.5" fill="#ffd93d" stroke="none"/>
                    </svg>
                </span>
                <span class="key">ПАССИВ</span>
                <span class="cd" id="passiveCd">Готов</span>
            </button>
        </div>
    </div>
    <script>
    // ============================================================
    // 1. ИНИЦИАЛИЗАЦИЯ
    // ============================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    function resizeCanvas() {
        const field = document.getElementById('game-field');
        canvas.width = field.clientWidth;
        canvas.height = field.clientHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ============================================================
    // 2. ПИКСЕЛЬНЫЕ ФУНКЦИИ
    // ============================================================
    function drawPixelCircle(cx, cy, r, color) {
        const startX = Math.floor(cx - r), startY = Math.floor(cy - r);
        const endX = Math.floor(cx + r), endY = Math.floor(cy + r);
        ctx.fillStyle = color;
        for (let y = startY; y <= endY; y++) {
            for (let x = startX; x <= endX; x++) {
                const dx = x - cx, dy = y - cy;
                if (dx*dx + dy*dy <= r*r) ctx.fillRect(x, y, 1, 1);
            }
        }
    }

    function drawPixelLine(x1, y1, x2, y2, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(Math.floor(x1), Math.floor(y1));
        ctx.lineTo(Math.floor(x2), Math.floor(y2));
        ctx.stroke();
    }

    // ============================================================
    // 3. ИГРОВЫЕ ОБЪЕКТЫ
    // ============================================================
    const game = {
        kills: 0,
        deaths: 0,
        hp: 100,
        energy: 100,
        maxEnergy: 100,
        hero: { x: 0, y: 0, radius: 14 },
        bots: [],
        particles: [],
        hook: null,
        aimAngle: 0,
        gameOver: false,
        leftJoystick: { active: false, dx: 0, dy: 0, touchId: null, startX: 0, startY: 0 },
        rightJoystick: { active: false, dx: 0, dy: 0, touchId: null, startX: 0, startY: 0 },
        invisible: false,
        invisTimer: 0
    };

    // КД (в секундах * 60)
    const cooldowns = { hook: 0, shift: 0, blink: 0, passive: 0 };
    const maxCooldowns = { hook: 3.5 * 60, shift: 4.5 * 60, blink: 3 * 60, passive: 0 };

    // ============================================================
    // 4. СОЗДАНИЕ БОТОВ
    // ============================================================
    function createBots() {
        game.bots = [];
        const botColors = ['#8B0000', '#006400', '#4a0080', '#8B4513', '#2F4F4F'];
        const positions = [
            { x: 80, y: 80 },
            { x: canvas.width - 80, y: 80 },
            { x: 80, y: canvas.height - 80 },
            { x: canvas.width - 80, y: canvas.height - 80 },
            { x: canvas.width/2, y: 60 }
        ];
        for (let i = 0; i < 5; i++) {
            game.bots.push({
                x: positions[i].x,
                y: positions[i].y,
                radius: 14,
                color: botColors[i],
                alive: true,
                hookCooldown: 0,
                maxHookCooldown: 50 + Math.random() * 30,
                moveTimer: 0,
                aimAngle: 0,
                hook: null,
                respawnTimer: 0
            });
        }
    }

    // ============================================================
    // 5. ДЖОЙСТИКИ
    // ============================================================
    function handleTouchStart(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        for (const touch of e.changedTouches) {
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            if (x < canvas.width / 2) {
                game.leftJoystick.active = true;
                game.leftJoystick.touchId = touch.identifier;
                game.leftJoystick.startX = x;
                game.leftJoystick.startY = y;
                game.leftJoystick.dx = 0; game.leftJoystick.dy = 0;
            } else {
                game.rightJoystick.active = true;
                game.rightJoystick.touchId = touch.identifier;
                game.rightJoystick.startX = x;
                game.rightJoystick.startY = y;
                game.rightJoystick.dx = 0; game.rightJoystick.dy = 0;
            }
        }
    }

    function handleTouchMove(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        for (const touch of e.changedTouches) {
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            if (game.leftJoystick.touchId === touch.identifier && game.leftJoystick.active) {
                const dx = x - game.leftJoystick.startX;
                const dy = y - game.leftJoystick.startY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5) {
                    const angle = Math.atan2(dy, dx);
                    const moveDist = Math.min(dist / 20, 1) * 2.5;
                    game.hero.x += Math.cos(angle) * moveDist;
                    game.hero.y += Math.sin(angle) * moveDist;
                    const margin = 30;
                    game.hero.x = Math.max(margin, Math.min(canvas.width - margin, game.hero.x));
                    game.hero.y = Math.max(margin, Math.min(canvas.height - margin, game.hero.y));
                }
                const maxDist = 50;
                if (dist > maxDist) {
                    game.leftJoystick.dx = (dx / dist) * maxDist;
                    game.leftJoystick.dy = (dy / dist) * maxDist;
                } else {
                    game.leftJoystick.dx = dx;
                    game.leftJoystick.dy = dy;
                }
            }
            if (game.rightJoystick.touchId === touch.identifier && game.rightJoystick.active) {
                const dx = x - game.rightJoystick.startX;
                const dy = y - game.rightJoystick.startY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5) game.aimAngle = Math.atan2(dy, dx);
                const maxDist = 60;
                if (dist > maxDist) {
                    game.rightJoystick.dx = (dx / dist) * maxDist;
                    game.rightJoystick.dy = (dy / dist) * maxDist;
                } else {
                    game.rightJoystick.dx = dx;
                    game.rightJoystick.dy = dy;
                }
            }
        }
    }

    function handleTouchEnd(e) {
        e.preventDefault();
        for (const touch of e.changedTouches) {
            if (game.leftJoystick.touchId === touch.identifier) {
                game.leftJoystick.active = false;
                game.leftJoystick.dx = 0; game.leftJoystick.dy = 0;
                game.leftJoystick.touchId = null;
            }
            if (game.rightJoystick.touchId === touch.identifier) {
                const dist = Math.sqrt(game.rightJoystick.dx*game.rightJoystick.dx + game.rightJoystick.dy*game.rightJoystick.dy);
                if (dist > 20) useHook(game.aimAngle);
                game.rightJoystick.active = false;
                game.rightJoystick.dx = 0; game.rightJoystick.dy = 0;
                game.rightJoystick.touchId = null;
            }
        }
    }

    canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
    canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
    canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
    canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

    // Мышь для ПК
    let mouseDown = false;
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        if (x < canvas.width / 2) {
            game.leftJoystick.active = true;
            game.leftJoystick.startX = x;
            game.leftJoystick.startY = y;
        } else {
            game.rightJoystick.active = true;
            game.rightJoystick.startX = x;
            game.rightJoystick.startY = y;
        }
        mouseDown = true;
    });
    canvas.addEventListener('mousemove', (e) => {
        if (!mouseDown) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        if (game.leftJoystick.active) {
            const dx = x - game.leftJoystick.startX;
            const dy = y - game.leftJoystick.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 5) {
                const angle = Math.atan2(dy, dx);
                const moveDist = Math.min(dist / 20, 1) * 2.5;
                game.hero.x += Math.cos(angle) * moveDist;
                game.hero.y += Math.sin(angle) * moveDist;
                const margin = 30;
                game.hero.x = Math.max(margin, Math.min(canvas.width - margin, game.hero.x));
                game.hero.y = Math.max(margin, Math.min(canvas.height - margin, game.hero.y));
            }
            const maxDist = 50;
            if (dist > maxDist) {
                game.leftJoystick.dx = (dx / dist) * maxDist;
                game.leftJoystick.dy = (dy / dist) * maxDist;
            } else {
                game.leftJoystick.dx = dx;
                game.leftJoystick.dy = dy;
            }
        }
        if (game.rightJoystick.active) {
            const dx = x - game.rightJoystick.startX;
            const dy = y - game.rightJoystick.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 5) game.aimAngle = Math.atan2(dy, dx);
            const maxDist = 60;
            if (dist > maxDist) {
                game.rightJoystick.dx = (dx / dist) * maxDist;
                game.rightJoystick.dy = (dy / dist) * maxDist;
            } else {
                game.rightJoystick.dx = dx;
                game.rightJoystick.dy = dy;
            }
        }
    });
    canvas.addEventListener('mouseup', () => {
        const dist = Math.sqrt(game.rightJoystick.dx*game.rightJoystick.dx + game.rightJoystick.dy*game.rightJoystick.dy);
        if (dist > 20) useHook(game.aimAngle);
        game.leftJoystick.active = false;
        game.leftJoystick.dx = 0;
        game.rightJoystick.active = false;
        game.rightJoystick.dx = 0;
        mouseDown = false;
    });
    canvas.addEventListener('mouseleave', () => {
        game.leftJoystick.active = false;
        game.leftJoystick.dx = 0;
        game.rightJoystick.active = false;
        game.rightJoystick.dx = 0;
        mouseDown = false;
    });

    // ============================================================
    // 6. СКИЛЛЫ
    // ============================================================
    function useHook(angle) {
        if (cooldowns.hook > 0 || game.gameOver) return;
        cooldowns.hook = maxCooldowns.hook;
        document.getElementById('hookCd').textContent = '3.5s';
        document.getElementById('hookCd').style.color = '#ff1a1a';
        const startX = game.hero.x, startY = game.hero.y;
        const length = 300;
        const endX = startX + Math.cos(angle) * length;
        const endY = startY + Math.sin(angle) * length;
        game.hook = { x1: startX, y1: startY, x2: endX, y2: endY, life: 25 };

        // Попадание по ботам — один хук = смерть
        for (const bot of game.bots) {
            if (!bot.alive) continue;
            const dist = distanceToSegment(bot.x, bot.y, startX, startY, endX, endY);
            if (dist < 30) {
                bot.alive = false;
                bot.respawnTimer = 120;
                game.kills++;
                updateKills();
                spawnParticles(bot.x, bot.y, '#ff1a1a', 30);
                game.hp = Math.min(100, game.hp + 10);
                updateHP();
                break;
            }
        }
    }

    function useShift() {
        if (cooldowns.shift > 0 || game.gameOver) return;
        cooldowns.shift = maxCooldowns.shift;
        document.getElementById('shiftCd').textContent = '4.5s';
        document.getElementById('shiftCd').style.color = '#ff1a1a';
        game.invisible = true;
        game.invisTimer = 120;
        spawnParticles(game.hero.x, game.hero.y, '#00b894', 20);
        setTimeout(() => {
            game.invisible = false;
            spawnParticles(game.hero.x, game.hero.y, '#00b894', 15);
        }, 2000);
    }

    function useBlink() {
        if (cooldowns.blink > 0 || game.gameOver) return;
        cooldowns.blink = maxCooldowns.blink;
        document.getElementById('blinkCd').textContent = '3.0s';
        document.getElementById('blinkCd').style.color = '#ff1a1a';
        const angle = game.aimAngle || 0;
        const dist = 120;
        const newX = game.hero.x + Math.cos(angle) * dist;
        const newY = game.hero.y + Math.sin(angle) * dist;
        const margin = 30;
        game.hero.x = Math.max(margin, Math.min(canvas.width - margin, newX));
        game.hero.y = Math.max(margin, Math.min(canvas.height - margin, newY));
        spawnParticles(game.hero.x, game.hero.y, '#6c5ce7', 25);
    }

    function usePassive() {
        if (game.gameOver) return;
        game.hp = Math.min(100, game.hp + 20);
        game.energy = Math.min(100, game.energy + 25);
        updateHP();
        updateEnergy();
        spawnParticles(game.hero.x, game.hero.y, '#ffd93d', 15);
        document.getElementById('passiveCd').textContent = '✅ Исп.';
        setTimeout(() => document.getElementById('passiveCd').textContent = 'Готов', 2000);
    }

    // ============================================================
    // 7. ВСПОМОГАТЕЛЬНЫЕ
    // ============================================================
    function distanceToSegment(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        const lenSq = dx*dx + dy*dy;
        if (lenSq === 0) return Math.sqrt((px-x1)*(px-x1) + (py-y1)*(py-y1));
        let t = ((px-x1)*dx + (py-y1)*dy) / lenSq;
        t = Math.max(0, Math.min(1, t));
        const projX = x1 + t*dx, projY = y1 + t*dy;
        return Math.sqrt((px-projX)*(px-projX) + (py-projY)*(py-projY));
    }

    function spawnParticles(x, y, color, count = 15) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1 + Math.random() * 3;
            game.particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 20 + Math.random() * 20,
                maxLife: 40,
                radius: 2 + Math.random() * 3,
                color: color
            });
        }
    }

    // ============================================================
    // 8. БОТЫ (AI) — УБИВАЮТ ХУКОМ
    // ============================================================
    function updateBots() {
        for (const bot of game.bots) {
            if (!bot.alive) {
                bot.respawnTimer--;
                if (bot.respawnTimer <= 0) {
                    bot.alive = true;
                    bot.x = 50 + Math.random() * (canvas.width - 100);
                    bot.y = 50 + Math.random() * (canvas.height - 100);
                    bot.hookCooldown = 0;
                }
                continue;
            }

            // Цель — игрок (или случайная, если игрок в шифте)
            let targetX = game.hero.x;
            let targetY = game.hero.y;
            if (game.invisible) {
                bot.moveTimer--;
                if (bot.moveTimer <= 0) {
                    bot.moveTimer = 60 + Math.random() * 60;
                    bot.targetX = 50 + Math.random() * (canvas.width - 100);
                    bot.targetY = 50 + Math.random() * (canvas.height - 100);
                }
                targetX = bot.targetX || game.hero.x;
                targetY = bot.targetY || game.hero.y;
            }

            const dx = targetX - bot.x;
            const dy = targetY - bot.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            // Движение к игроку
            if (dist > 100) {
                const speed = 0.8;
                bot.x += (dx / dist) * speed;
                bot.y += (dy / dist) * speed;
            } else if (dist < 60) {
                const speed = 0.5;
                bot.x -= (dx / dist) * speed;
                bot.y -= (dy / dist) * speed;
            }

            bot.aimAngle = Math.atan2(dy, dx);
            bot.hookCooldown--;
            
            // Бот кидает хук (если игрок не в шифте)
            if (bot.hookCooldown <= 0 && dist < 350 && dist > 30 && !game.invisible) {
                bot.hookCooldown = bot.maxHookCooldown;
                const startX = bot.x, startY = bot.y;
                const length = 280;
                const endX = startX + Math.cos(bot.aimAngle) * length;
                const endY = startY + Math.sin(bot.aimAngle) * length;
                
                // Проверка попадания в игрока
                const distToHero = distanceToSegment(game.hero.x, game.hero.y, startX, startY, endX, endY);
                if (distToHero < 30) {
                    // 🩸 ВРАГ УБИВАЕТ ТЕБЯ ХУКОМ!
                    game.hp = 0;
                    game.deaths++;
                    updateDeaths();
                    updateHP();
                    spawnParticles(game.hero.x, game.hero.y, '#ff1a1a', 40);
                    game.gameOver = true;
                    setTimeout(() => {
                        alert('💀 Тебя убил хук бота! Нажми OK для рестарта');
                        resetGame();
                    }, 300);
                }
                bot.hook = { x1: startX, y1: startY, x2: endX, y2: endY, life: 20 };
            }
            if (bot.hook) {
                bot.hook.life--;
                if (bot.hook.life <= 0) bot.hook = null;
            }
        }
    }

    // ============================================================
    // 9. UI
    // ============================================================
    function updateKills() {
        document.getElementById('killsDisplay').textContent = game.kills;
    }

    function updateDeaths() {
        document.getElementById('deathsDisplay').textContent = game.deaths;
    }

    function updateHP() {
        document.getElementById('hpDisplay').textContent = Math.round(game.hp);
    }

    function updateEnergy() {
        document.getElementById('energyDisplay').textContent = Math.round(game.energy);
    }

    function resetGame() {
        game.hp = 100;
        game.kills = 0;
        game.deaths = 0;
        game.gameOver = false;
        game.invisible = false;
        game.invisTimer = 0;
        game.particles = [];
        game.hook = null;
        game.hero.x = canvas.width / 2;
        game.hero.y = canvas.height / 2;
        for (const key in cooldowns) cooldowns[key] = 0;
        document.getElementById('hookCd').textContent = '3.5s';
        document.getElementById('hookCd').style.color = '';
        document.getElementById('shiftCd').textContent = '4.5s';
        document.getElementById('shiftCd').style.color = '';
        document.getElementById('blinkCd').textContent = '3.0s';
        document.getElementById('blinkCd').style.color = '';
        document.getElementById('passiveCd').textContent = 'Готов';
        updateHP();
        updateKills();
        updateDeaths();
        document.getElementById('killsDisplay').textContent = '0';
        document.getElementById('deathsDisplay').textContent = '0';
        createBots();
    }

    // ============================================================
    // 10. ИГРОВОЙ ЦИКЛ
    // ============================================================
    function update() {
        // Обновление кд
        for (const key in cooldowns) {
            if (cooldowns[key] > 0) {
                cooldowns[key]--;
                if (key === 'hook' && cooldowns.hook > 0) {
                    const sec = Math.ceil(cooldowns.hook / 60 * 10) / 10;
                    document.getElementById('hookCd').textContent = sec.toFixed(1) + 's';
                }
                if (key === 'shift' && cooldowns.shift > 0) {
                    const sec = Math.ceil(cooldowns.shift / 60 * 10) / 10;
                    document.getElementById('shiftCd').textContent = sec.toFixed(1) + 's';
                }
                if (key === 'blink' && cooldowns.blink > 0) {
                    const sec = Math.ceil(cooldowns.blink / 60 * 10) / 10;
                    document.getElementById('blinkCd').textContent = sec.toFixed(1) + 's';
                }
                if (cooldowns[key] === 0) {
                    if (key === 'hook') { document.getElementById('hookCd').textContent = 'Готов'; document.getElementById('hookCd').style.color = ''; }
                    if (key === 'shift') { document.getElementById('shiftCd').textContent = 'Готов'; document.getElementById('shiftCd').style.color = ''; }
                    if (key === 'blink') { document.getElementById('blinkCd').textContent = 'Готов'; document.getElementById('blinkCd').style.color = ''; }
                }
            }
        }

        updateBots();

        // Частицы
        for (let i = game.particles.length - 1; i >= 0; i--) {
            const p = game.particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
            if (p.life <= 0) game.particles.splice(i, 1);
        }

        game.energy = Math.min(game.maxEnergy, game.energy + 0.05);
        updateEnergy();
        if (game.energy > 80 && game.hp < 100) {
            game.hp = Math.min(100, game.hp + 0.1);
            updateHP();
        }
    }

    // ============================================================
    // 11. ОТРИСОВКА
    // ============================================================
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Карта
        for (let x = 0; x < canvas.width; x += 32) {
            ctx.fillStyle = '#151515';
            ctx.fillRect(x, 0, 1, canvas.height);
        }
        for (let y = 0; y < canvas.height; y += 32) {
            ctx.fillStyle = '#151515';
            ctx.fillRect(0, y, canvas.width, 1);
        }

        // Боты
        for (const bot of game.bots) {
            if (!bot.alive) continue;
            const r = bot.radius;
            drawPixelCircle(bot.x, bot.y, r, bot.color);
            drawPixelCircle(bot.x, bot.y, r-4, '#4CAF50');
            ctx.fillStyle = 'white';
            ctx.fillRect(bot.x - 6, bot.y - 6, 4, 4);
            ctx.fillRect(bot.x + 2, bot.y - 6, 4, 4);
            ctx.fillStyle = 'black';
            ctx.fillRect(bot.x - 4, bot.y - 5, 2, 2);
            ctx.fillRect(bot.x + 4, bot.y - 5, 2, 2);
            if (bot.hook) {
                drawPixelLine(bot.hook.x1, bot.hook.y1, bot.hook.x2, bot.hook.y2, '#ff6b6b');
                drawPixelCircle(bot.hook.x2, bot.hook.y2, 6, '#ff6b6b');
            }
        }

        // Крюк игрока
        if (game.hook) {
            drawPixelLine(game.hook.x1, game.hook.y1, game.hook.x2, game.hook.y2, '#ff6b6b');
            drawPixelCircle(game.hook.x2, game.hook.y2, 8, '#ff6b6b');
        }

        // Герой
        if (!game.invisible || game.hook) {
            const h = game.hero;
            const r = 14;
            drawPixelCircle(h.x, h.y, r, '#006400');
            drawPixelCircle(h.x, h.y, r-4, '#4CAF50');
            ctx.fillStyle = 'white';
            ctx.fillRect(h.x - 6, h.y - 6, 4, 4);
            ctx.fillRect(h.x + 2, h.y - 6, 4, 4);
            ctx.fillStyle = 'black';
            ctx.fillRect(h.x - 4, h.y - 5, 2, 2);
            ctx.fillRect(h.x + 4, h.y - 5, 2, 2);
            ctx.fillStyle = 'black';
            ctx.fillRect(h.x - 4, h.y + 4, 8, 2);
            ctx.fillStyle = '#8B0000';
            ctx.fillRect(h.x + r, h.y - 2, 8, 4);
            ctx.fillRect(h.x + r + 4, h.y - 6, 4, 12);
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(h.x + r + 2, h.y - 1, 4, 2);
        } else {
            ctx.globalAlpha = 0.3;
            const h = game.hero;
            drawPixelCircle(h.x, h.y, 14, '#00b894');
            ctx.globalAlpha = 1;
        }

        // Прицел
        if (game.rightJoystick.active && game.rightJoystick.dx !== 0) {
            const angle = game.aimAngle;
            const len = 50;
            const endX = game.hero.x + Math.cos(angle) * len;
            const endY = game.hero.y + Math.sin(angle) * len;
            ctx.strokeStyle = 'rgba(255, 107, 107, 0.5)';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(game.hero.x, game.hero.y);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Частицы
        for (const p of game.particles) {
            ctx.globalAlpha = p.life / p.maxLife;
            ctx.fillStyle = p.color;
            ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.floor(p.radius), Math.floor(p.radius));
            ctx.globalAlpha = 1;
        }

        // Джойстики
        if (game.leftJoystick.active) {
            const jx = game.leftJoystick.startX;
            const jy = game.leftJoystick.startY;
            ctx.strokeStyle = 'rgba(0, 255, 65, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(jx, jy, 40, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = 'rgba(0, 255, 65, 0.1)';
            ctx.beginPath();
            ctx.arc(jx + game.leftJoystick.dx, jy + game.leftJoystick.dy, 15, 0, Math.PI * 2);
            ctx.fill();
        }
        if (game.rightJoystick.active) {
            const jx = game.rightJoystick.startX;
            const jy = game.rightJoystick.startY;
            ctx.strokeStyle = 'rgba(255, 107, 107, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(jx, jy, 40, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = 'rgba(255, 107, 107, 0.1)';
            ctx.beginPath();
            ctx.arc(jx + game.rightJoystick.dx, jy + game.rightJoystick.dy, 15, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // ============================================================
    // 12. ЗАПУСК
    // ============================================================
    game.hero.x = canvas.width / 2;
    game.hero.y = canvas.height / 2;
    createBots();

    document.querySelectorAll('.skill-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            const skill = this.dataset.skill;
            switch(skill) {
                case 'hook': useHook(game.aimAngle); break;
                case 'shift': useShift(); break;
                case 'blink': useBlink(); break;
                case 'passive': usePassive(); break;
            }
        });
    });

    function gameLoop() {
        if (!game.gameOver) update();
        draw();
        requestAnimationFrame(gameLoop);
    }
    gameLoop();

    console.log('🎮 Pudge Wars — Хардкор!');
    console.log('🩸 Враги убивают тебя одним хуком!');
    console.log('🪝 Хук: 3.5s | 👻 Шифт: 4.5s | ⚡ Блинк: 3.0s');
    </script>
</body>
</html>
